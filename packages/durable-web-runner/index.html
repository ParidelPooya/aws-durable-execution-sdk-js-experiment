<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Durable Execution Web Runner</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .editor { width: 100%; height: 300px; font-family: monospace; }
        .output { background: #f5f5f5; padding: 15px; margin-top: 10px; white-space: pre-wrap; }
        .error { background: #ffe6e6; color: #d00; }
        .success { background: #e6ffe6; color: #060; }
        button { padding: 10px 20px; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Durable Execution Web Runner</h1>
        <textarea id="codeInput" class="editor" placeholder="Enter your durable function code here...">
export const handler = withDurableExecution(
  async (event, context) => {
    const result = await context.step(async () => {
      return "Hello from durable execution!";
    });
    
    await context.wait({ seconds: 1 });
    
    return result;
  }
);
        </textarea>
        <br>
        <button onclick="runCode()">Run Code</button>
        <div id="output" class="output"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
